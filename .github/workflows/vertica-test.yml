name: Test package against latest Vertica

# Triggers the workflow on push or pull request events
on: [push, workflow_dispatch]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.9' ,'3.10', '3.11', '3.12']
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    # ---------------------------
      # Kubernetes (KinD) + Helm setup
      # ---------------------------
    - name: Set up Kubernetes (KinD)
      uses: helm/kind-action@v1.8.0
      with:
        cluster_name: vertica-ci
        node_image: kindest/node:v1.29.0

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: "3.11.3"
    
    - name: Create Vertica license secret
      run: |
        echo "${{ secrets.VERTICA_LICENSE }}" > license.dat

        kubectl create ns my-verticadb-operator --dry-run=client -o yaml | kubectl apply -f -

        kubectl create secret generic vertica-license \
          -n my-verticadb-operator \
          --from-file=license.dat \
          --dry-run=client -o yaml | kubectl apply -f -

        kubectl get secret vertica-license -n my-verticadb-operator

    
      
    - name: Add Helm repositories
      run: |
        helm repo add vertica-charts https://vertica.github.io/charts
        helm repo add bitnami https://charts.bitnami.com/bitnami || true
        helm repo update

    # ---------------------------
    # MinIO Setup
    # ---------------------------
    - name: Install MinIO
      run: |
        kubectl create ns minio
        cat <<'EOF' > minio.yaml
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: minio
          namespace: minio
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: minio
          template:
            metadata:
              labels:
                app: minio
            spec:
              containers:
                - name: minio
                  image: minio/minio:latest
                  args: ["server", "/data"]
                  env:
                    - name: MINIO_ROOT_USER
                      value: "minioadmin"
                    - name: MINIO_ROOT_PASSWORD
                      value: "minioadmin"
                  ports:
                    - containerPort: 9000
                  volumeMounts:
                    - name: data
                      mountPath: /data
              volumes:
                - name: data
                  emptyDir: {}
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: minio
          namespace: minio
        spec:
          selector:
            app: minio
          ports:
            - port: 9000
              targetPort: 9000
        EOF
        kubectl apply -f minio.yaml
        kubectl -n minio rollout status deployment/minio --timeout=2m
        kubectl get pods -n minio -o wide || true
        kubectl get svc -n minio || true
    
    - name: Ensure MinIO bucket exists
      run: |
        kubectl run mc-client \
          --restart=Never \
          --image=minio/mc:latest \
          -n minio \
          --command -- \
          sh -c "
            mc alias set localminio http://minio.minio.svc.cluster.local:9000 minioadmin minioadmin &&
            mc mb --ignore-existing localminio/vertica-fleeting &&
            mc ls localminio
          "

        kubectl wait --for=condition=Ready pod/mc-client -n minio --timeout=60s || true
        kubectl logs mc-client -n minio
        kubectl delete pod mc-client -n minio --ignore-not-found
    
    - name: Create MinIO Secret
      run: |
        kubectl create ns my-verticadb-operator \
          --dry-run=client -o yaml | kubectl apply -f -

        kubectl delete secret communal-creds \
          -n my-verticadb-operator \
          --ignore-not-found

        kubectl create secret generic communal-creds \
          -n my-verticadb-operator \
          --from-literal=accesskey=minioadmin \
          --from-literal=secretkey=minioadmin

        kubectl get secret communal-creds \
          -n my-verticadb-operator -o yaml

    # ---------------------------
    # Vertica Operator + DB Deployment
    # ---------------------------
    - name: Install Vertica Operator
      run: |
        cat <<'EOF' > operator-values.yaml
        installCRDs: true
        controller:
          extraEnv:
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
        EOF
        helm upgrade --install vdb-op vertica-charts/verticadb-operator \
          -n my-verticadb-operator -f operator-values.yaml --wait --timeout 10m
        kubectl -n my-verticadb-operator get pods -o wide || true

    - name: Deploy VerticaDB and per-node Services
      run: |
        cat <<'EOF' | kubectl apply -f - 
        apiVersion: vertica.com/v1
        kind: VerticaDB
        metadata:
          name: verticadb-sample
          namespace: my-verticadb-operator
          annotations:
            vertica.com/k-safety: "0"
        spec:
          image: opentext/vertica-k8s:latest
          licenseSecret: vertica-license
          dbName: vdb
          initPolicy: Create
          communal:
            path: s3://vertica-fleeting/mkottakota/
            credentialSecret: communal-creds
            endpoint: http://minio.minio.svc.cluster.local:9000
            region: us-east-1
          local:
            dataPath: /data
            depotPath: /depot
          subclusters:
            - name: defaultsubcluster
              size: 1
        ---
        # -------------------------------------
        # Per-node Services (needed for LB tests)
        # Note: node-1 and node-2 pods don't exist yet because subcluster size=1.
        # These Services are intentional placeholders used when we scale the cluster
        # for load-balancing and failover tests. Kubernetes allows zero-endpoint Services.
        # -------------------------------------
        apiVersion: v1
        kind: Service
        metadata:
          name: vertica-node-0
          namespace: my-verticadb-operator
        spec:
          selector:
            statefulset.kubernetes.io/pod-name: verticadb-sample-defaultsubcluster-0
          ports:
            - port: 5433
              targetPort: 5433
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: vertica-node-1
          namespace: my-verticadb-operator
        spec:
          selector:
            statefulset.kubernetes.io/pod-name: verticadb-sample-defaultsubcluster-1
          ports:
            - port: 5433
              targetPort: 5433
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: vertica-node-2
          namespace: my-verticadb-operator
        spec:
          selector:
            statefulset.kubernetes.io/pod-name: verticadb-sample-defaultsubcluster-2
          ports:
            - port: 5433
              targetPort: 5433
        EOF

    - name: Wait for Vertica readiness
      run: |
        NS=my-verticadb-operator
        SS=verticadb-sample-defaultsubcluster
        POD=${SS}-0
        for i in {1..30}; do
          kubectl get pod ${POD} -n ${NS} && break || sleep 10
        done
        kubectl wait --for=condition=Ready pod/${POD} -n ${NS} --timeout=5m

        echo "🚀 Creating test runner pod..."
        kubectl -n ${NS} run test-runner --image=python:3.13-slim --restart=Never --command -- sleep infinity
        kubectl -n ${NS} wait --for=condition=Ready pod/test-runner --timeout=180s

        echo "🩹 Adding Vertica pod entries to /etc/hosts in test pod..."
        for p in $(kubectl -n $NS get pods -l app.kubernetes.io/instance=verticadb-sample -o jsonpath='{.items[*].metadata.name}'); do
          IP=$(kubectl -n $NS get pod $p -o jsonpath='{.status.podIP}')
          echo "$IP $p.$NS.svc.cluster.local $p" | kubectl -n $NS exec -i test-runner -- tee -a /etc/hosts >/dev/null
          echo "✔ Added $p -> $IP"
        done

        echo "📂 Copying repository into pod..."
        kubectl -n ${NS} cp . test-runner:/workspace
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine pip-tools
    - name: Build package
      run: python -m build
    - name: Check
      run: python -m twine check -- dist/*.tar.gz
    - name: Extract reqs
      run: pip-compile -o requirements.txt --extra dev setup.py
    - name: Install reqs
      run: pip install -r requirements.txt
    - name: Install
      run: python setup.py install
    - name: Run pytest in Kubernetes
      env:
        NS: my-verticadb-operator
      run: |
        echo "NS=$NS"

        kubectl run pytest-runner \
          --image=python:3.11 \
          --restart=Never \
          -n "$NS" \
          -- sleep infinity

        kubectl wait \
          --for=condition=Ready \
          pod/pytest-runner \
          -n "$NS" \
          --timeout=120s

        kubectl cp . "$NS"/pytest-runner:/workspace
        kubectl exec -n "$NS" pytest-runner -- bash -c '
          cd /workspace &&
          pip install -U pip &&
          pip install pytest &&
          pip install -r requirements.txt &&
          pip install -e . &&
          python -m pytest tests/functional/adapter/test_basic.py &&
          python -m pytest tests/functional/adapter/constraints/test_constraints.py &&
          python -m pytest tests/functional/adapter/incremental/ &&
          python -m pytest tests/functional/adapter/concurrency &&
          python -m pytest tests/functional/adapter/test_doc_gen.py &&
          python -m pytest tests/functional/adapter/test_data_types.py &&
          python -m pytest tests/functional/adapter/utils/test_concat.py &&
          python -m pytest tests/functional/adapter/utils/data_type/ &&
          python -m pytest tests/functional/adapter/test_get_last_relation_modified.py &&
          python -m pytest tests/functional/adapter/test_list_relations_without_caching.py &&
          python -m pytest tests/functional/adapter/store_test_failures_tests/test_store_test_failures.py &&
          python -m pytest tests/functional/adapter/utils/test_date_spine.py &&
          python -m pytest tests/functional/adapter/dbt-show/test_dbt_show.py &&
          python -m pytest tests/functional/adapter/dbt_clone/ &&
          python -m pytest tests/functional/adapter/seeds/test_seeds.py &&
          python -m pytest tests/functional/adapter/simple_snapshot/ &&
          python -m pytest tests/functional/adapter/sample_mode/ &&
          python -m pytest tests/functional/adapter/functions/ &&
          python -m pytest tests/functional/adapter/test_persist_docs.py -v
        '